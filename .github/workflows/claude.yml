name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          # For new issues: diagnose and create a fix branch with a commit
          # For @claude mentions: follow the instructions in the comment
          prompt: |
            ${{ github.event_name == 'issues' && github.event.action == 'opened' && format('A new issue has been opened: #{0}\nTitle: {1}\nBody: {2}\n\nPlease:\n1. Analyze the issue and diagnose the root cause by reading the relevant code\n2. Implement a fix for the issue\n3. Create a new branch with a descriptive name based on the issue (e.g. fix/issue-{0}-short-description)\n4. Commit your changes to that branch and push it\n5. Create a pull request from that branch back to the default branch, referencing the issue with "Fixes #{0}" in the PR description\n\nIf the issue is a question or discussion rather than a bug/feature request, just comment on the issue with a helpful response instead of creating a branch.', github.event.issue.number, github.event.issue.title, github.event.issue.body) || '' }}
